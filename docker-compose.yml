services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: abm
      POSTGRES_PASSWORD: abm
      POSTGRES_DB: abm
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abm -d abm"]
      interval: 3s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "4000:3000"
    environment:
      DATABASE_URL: postgresql://abm:abm@db:5432/abm
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
